name: nequipjax
channels:
  - conda-forge
  - defaults

dependencies:
  # ----------------------
  # Python
  # ----------------------
  - python=3.11.7
  - python_abi=3.11=4_cp311

  # ----------------------
  # Core system libs
  # ----------------------
  - libgcc-ng=13.2.0
  - libstdcxx-ng=13.2.0
  - libgfortran-ng=13.2.0
  - libgfortran5=13.2.0
  - libzlib=1.2.13
  - openssl=3.2.1
  - ca-certificates=2024.2.2

  # ----------------------
  # Math stack (MKL pinned)
  # ----------------------
  - blas=1.0=mkl
  - mkl=2023.2.0
  - mkl-service=2.4.0
  - mkl_fft=1.3.8
  - mkl_random=1.2.4
  - intel-openmp=2023.1.0

  - numpy=1.26.3
  - scipy=1.12.0
  - sympy=1.12
  - pandas=2.2.0
  - scikit-learn=1.4.0

  # ----------------------
  # RDKit (conda, NOT pip)
  # ----------------------
  - rdkit=2024.03.5

  # ----------------------
  # Scientific utils
  # ----------------------
  - ase=3.23.0
  - networkx=3.2.1
  - tqdm=4.66.1
  - pyyaml=6.0.1
  - matplotlib=3.8.2
  - seaborn=0.13.2
  - pillow=10.2.0

  # ----------------------
  # Dev / Jupyter
  # ----------------------
  - ipython=8.21.0
  - ipykernel=6.29.0
  - jupyter_client=8.6.0
  - jupyter_core=5.7.1

  - pip=24.0
  - setuptools=69.0.3
  - wheel=0.42.0

  # ----------------------
  # PIP SECTION (GPU JAX)
  # ----------------------
  - pip:
      # ---- JAX CUDA12 (strictly pinned) ----
      - jax[cuda12]==0.4.28
      - jaxlib==0.4.28

      # ---- Flax stack (compatibility locked) ----
      - flax==0.8.0
      - optax==0.1.8
      - chex==0.1.85
      - orbax-checkpoint==0.5.2
      - jmp==0.0.4
      - ml-dtypes==0.3.2

      # ---- e3nn / graph stack ----
      - e3nn-jax==0.20.6
      - jraph==0.0.6.dev0

      # ---- NequIP-JAX (Git pinned branch) ----
      - git+https://github.com/mariogeiger/nequip-jax@main

      # ---- NVIDIA CUDA 12 runtime (strictly pinned) ----
      - nvidia-cublas-cu12==12.3.4.1
      - nvidia-cuda-runtime-cu12==12.3.101
      - nvidia-cudnn-cu12==8.9.7.29
      - nvidia-cufft-cu12==11.0.12.1
      - nvidia-cusolver-cu12==11.5.4.101
      - nvidia-cusparse-cu12==12.2.0.103
      - nvidia-nccl-cu12==2.19.3
      - nvidia-nvjitlink-cu12==12.3.101

      # ---- misc strict pins ----
      - protobuf==4.25.2
      - rich==13.7.0
      - tensorstore==0.1.52
      - toolz==0.12.1